; CTerm configuration - PROGDIR:cterm.cfg
; KEY VALUE lines, keys case-insensitive, ';' starts a comment.
; The command line overrides anything set here.
;
; CONSOLE - the console handler the frame window is handed to:
; CON: (default), CCON:, KCON:, VNC:, any mounted console device.
;CONSOLE CCON:
;
; HEADER/FOOTER - band art files of your own (plain or ANSI;
; a header claims up to 6 lines, a footer up to 3). Naming one
; band shows only that band; naming neither shows the built-in
; mockup art.
;HEADER S:CMenu/Headers/top1.ANS
;FOOTER DH0:Art/ltx-footer.txt
;
; FULL ON - no bands, the console takes the whole screen.
;FULL ON
;
; ANSI ON - the classic 8-colour ANSI palette, even with plain
; or no bands (ANSI band files engage it by themselves).
;ANSI ON
;
; FROM - a script the shell executes before its first prompt
; (aliases and assigns set there stick).
;FROM S:Shell-Startup
